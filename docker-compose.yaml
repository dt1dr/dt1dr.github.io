services:
  jekyll-site:
    build: .
    image: jekyll-site
    volumes:
      - .:/usr/src/app
    ports:
      - "4000:4000"
      - "35729:35729"
    user: "1000:1000"
    working_dir: /usr/src/app
    environment:
      - JEKYLL_ENV=docker
    command: bundle exec jekyll serve -H 0.0.0.0 --watch --force_polling --livereload --config _config.yml,_config_docker.yml